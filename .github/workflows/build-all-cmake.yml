name: Build all cmake projects

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v7
      with:
        python-version: '3.14' 
        
    - name: Install Podman
      run: sudo apt-get update && sudo apt-get -y install podman

    - name: Find and build targets
      run: python3 ./Other/repo-management/ProjectDiscovery.py
