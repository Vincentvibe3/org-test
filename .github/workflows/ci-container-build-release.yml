name: Build CI build container and release to ghcr

on:
  workflow_dispatch:
  push:
    paths:
      - 'Other/repo-management/**'
  
jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Get short commit hash
      run  : echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Enter build directory
      run: cd ./Other/repo-management

    - name: Build docker image
      run: docker build -f Containerfile -t ghcr.io/Vincentvibe3/rover-embedded-runner:latest -t ghcr.io/Vincentvibe3/rover-embedded-runner:$SHORT_SHA

    - name: Push docker image
      run: docker push -f Containerfile -t ghcr.io/Vincentvibe3/rover-embedded-runner:latest -t ghcr.io/Vincentvibe3/rover-embedded-runner:$SHORT_SHA
